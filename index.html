        const getYoutubeId = (url) => {
            if (!url) return null;
            let str = url.trim();
            // ถ้ายูสเซอร์ก๊อปปี้ iframe ให้ดึงเฉพาะส่วนลิงก์ใน src="" ออกมา
            const srcMatch = str.match(/src=["']([^"']+)["']/);
            if (srcMatch) {
                str = srcMatch[1];
            }
            // สกัด ID 11 ตัวอักษรของ YouTube
            const regExp = /(?:v=|v\/|vi=|vi\/|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/;
            const match = str.match(regExp);
            if (match && match[1]) {
                return match[1];
            }
            // ถ้ากรอกมาแค่ ID เพียวๆ
            if (/^[a-zA-Z0-9_-]{11}$/.test(str)) {
                return str;
            }
            return null;
        };

          const padArray = (arr, length) => {
              const result = [...arr];
              while (result.length < length) {
                  result.push(null); // ใส่ null เป็นกรอบว่าง
              }
              return result.slice(0, length);
          };

          const townhouses = padArray(availableProps.filter(p => p.category?.includes('ทาวน์เฮาส์')), 3);
          const twinHouses = padArray(availableProps.filter(p => p.category === 'บ้านแฝด'), 3);

          const formatPrice = (price) => {
              const num = Number(price);
              if (isNaN(num)) return `ราคา ${price}`;
              if (num >= 1000000) {
                  return `ราคา ${Number((num / 1000000).toFixed(2))} ล้านบาท`;

              return `ราคา ${num.toLocaleString()} บาท`;

        function CalculatorSection({ defaultPrice, minimalist = false }) {
          const [loanAmount, setLoanAmount] = useState(defaultPrice || '');
          const [interest, setInterest] = useState(3);
          const [age, setAge] = useState('');
          const [years, setYears] = useState(0);
          const [monthlyPayment, setMonthlyPayment] = useState(null);

          useEffect(() => { if (defaultPrice) setLoanAmount(defaultPrice); }, [defaultPrice]);
          useEffect(() => { setYears(age ? Math.max(0, Math.min(40, 70 - parseInt(age))) : 0); }, [age]);
            
          const handleCalculate = () => {
            if (years <= 0 || !loanAmount) { setMonthlyPayment(0); return; }
            const r = interest / 100 / 12; const n = years * 12;
            const payment = (Number(loanAmount) * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            setMonthlyPayment(isNaN(payment) ? 0 : payment.toFixed(0));
          };

          return (
            <div className={minimalist ? "" : "max-w-3xl mx-auto bg-white rounded-3xl p-8 md:p-12 shadow-sm border border-gray-100"}>
              {!minimalist && <h2 className="text-2xl font-light text-center text-brand-green mb-8">คำนวณสินเชื่อเบื้องต้น</h2>}

                     <div className={minimalist ? "grid grid-cols-2 gap-4" : ""} >
                        <div><label className="label">ดอกเบี้ย (%)</label><input type="number" step="0.1" value={interest} onChange={e=>setInterest(Number(e.target.value))} className="input-modern"/></div>
                        {!minimalist && <div></div>}
                     </div>
                 </div>
                 
                 <div className="grid grid-cols-2 gap-4">
                     <div><label className="label">อายุผู้กู้ (ปี)</label><input type="number" min="20" max="70" value={age} onChange={e=>setAge(e.target.value)} className="input-modern"/></div>
                     <div><label className="label">ระยะเวลา (ปี)</label><div className="input-modern bg-gray-50 text-gray-500 border-transparent">{years > 0 ? `${years} ปี` : '-'}</div></div>
                 </div>

                 <button onClick={handleCalculate} className="w-full bg-brand-green text-white py-3.5 rounded-full font-light mt-4 hover:bg-opacity-90 transition">คำนวณ</button>

                    <div className="mt-6 text-center p-6 bg-brand-light/30 rounded-2xl">

            const uploadFileToCloudinary = async (file) => {
                const fd = new FormData();

                try {
                    const response = await fetch(CLOUDINARY_URL, {
                        method: 'POST',
                        body: fd
                    });
                    const data = await response.json();
                    
                    if (data.secure_url) {
                        return data.secure_url;
                    } else {
                        console.error("Cloudinary Error:", data);
                        throw new Error(data.error?.message || "อัปโหลดไม่สำเร็จ (โปรดเช็คว่า Upload Preset เป็น Unsigned)");
                    }

                    const uploadedUrls = [];
                    for (const file of allowedFiles) {

                    setImagesPreview(prev => {

                    const lat = formData.lat ? String(formData.lat).trim() : ''; 
                    const lng = formData.lng ? String(formData.lng).trim() : '';
                    const facilitiesList = Array.isArray(formData.facilitiesList) ? formData.facilitiesList : [];
                    
                    const dataToSave = { ...formData, lat, lng, facilitiesList };
                    if (editData) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'properties', editData.id), dataToSave);
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'properties'), { ...dataToSave, createdAt: serverTimestamp() });
                    setIsSaving(false); setSaveSuccess(true);
                } catch (err) { setIsSaving(false); alert("Error: " + err.message); }
            };

            const closeSuccessOverlay = () => { setSaveSuccess(false); setIsEditing(false); setEditData(null); setFormData(initialForm); setImagesPreview([]); };

            const handleDeleteProperty = async (id) => { if (window.confirm('ยืนยันการลบ?')) { try { setIsSaving(true); await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'properties', id)); setIsSaving(false); } catch (error) { setIsSaving(false); alert(error.message); } } };

            const handleSaveCompany = async (e) => { 
                e.preventDefault(); setIsSaving(true); 
                const companyDataToSave = { ...companyForm }; 
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'company_info', 'main'), companyDataToSave); 
                setCompanyForm(companyDataToSave); setIsSaving(false); setSaveSuccess(true); 
            };

            const handleAddYear = () => { if(!newPortfolioYear) return; const currentYears = companyForm.portfolio_years || []; if(currentYears.find(y => y.year === newPortfolioYear)) { alert('มีปีนี้อยู่แล้ว'); return; } setCompanyForm({ ...companyForm, portfolio_years: [...currentYears, { year: newPortfolioYear, images: [] }] }); setNewPortfolioYear(''); };
            const handleDeleteYear = (year) => { if(confirm(`ลบข้อมูลปี ${year}?`)) { setCompanyForm({ ...companyForm, portfolio_years: companyForm.portfolio_years.filter(y => y.year !== year) }); } };
            const removePortfolioImageInYear = (yearIndex, imgIndex) => { const updatedYears = [...companyForm.portfolio_years]; updatedYears[yearIndex].images = updatedYears[yearIndex].images.filter((_, i) => i !== imgIndex); setCompanyForm({ ...companyForm, portfolio_years: updatedYears }); };
            
            const handleSavePortfolio = async () => { 
                setIsSaving(true); 
                const dataToSave = { ...companyForm }; 
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'company_info', 'main'), dataToSave); 
                setCompanyForm(dataToSave); setIsSaving(false); setSaveSuccess(true); 
            };

            const handleAddUser = async (e) => { e.preventDefault(); if (!inviteEmail || !invitePassword) return; try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', inviteEmail.toLowerCase().trim()), { email: inviteEmail.toLowerCase().trim(), password: invitePassword, role: inviteRole, addedBy: userEmail, createdAt: serverTimestamp() }); setInviteEmail(''); setPassword(''); alert('เพิ่มเรียบร้อย'); } catch (err) { alert(err.message); } };
            const handleUpdateRole = async (userId, newRole) => { if (confirm(`ยืนยันเปลี่ยนสิทธิ์เป็น ${newRole}?`)) { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { role: newRole }); } catch (err) { alert(err.message); } } };
            const handleApproveUser = async (userId, role, email) => { if (confirm(`อนุมัติสิทธิ์ ${role} ให้ ${email}?`)) { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { role: role }); } catch (err) { alert(err.message); } } };
            const handleRemoveUser = async (id) => { if(confirm('ลบสิทธิ์ผู้ใช้นี้?')) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id)); } };

                            {userRole === 'host' && <button onClick={() => setPanelTab('users')} className={`px-6 py-3 text-left text-sm flex items-center gap-3 transition ${panelTab === 'users' ? 'text-brand-green bg-brand-light font-medium border-r-2 border-brand-green' : 'text-gray-500 hover:bg-gray-50'}`}><Users size={18}/> ผู้ดูแลระบบ</button>}

                                                    <div className="col-span-2"><label className="label">ซอย</label><input className="input-modern" value={formData.soi} onChange={e=>setFormData({...formData, soi: e.target.value})}/></div>
                                                    
                                                    <div className="col-span-1"><label className="label">ห้องนอน</label><input type="number" className="input-modern" value={formData.bedrooms} onChange={e=>setFormData({...formData, bedrooms: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">ห้องน้ำ</label><input type="number" className="input-modern" value={formData.bathrooms} onChange={e=>setFormData({...formData, bathrooms: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">จอดรถ</label><input className="input-modern" value={formData.parking} onChange={e=>setFormData({...formData, parking: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">ตร.ว.</label><input type="number" className="input-modern" value={formData.area_wah} onChange={e=>setFormData({...formData, area_wah: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">ตร.ม.</label><input type="number" className="input-modern" value={formData.area_sqm} onChange={e=>setFormData({...formData, area_sqm: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">จำนวนชั้น</label><input type="number" className="input-modern" value={formData.floors} onChange={e=>setFormData({...formData, floors: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">ทิศ</label><select className="input-modern" value={formData.direction} onChange={e=>setFormData({...formData, direction: e.target.value})}><option value="">- เลือก -</option>{DIRECTIONS.map(d=><option key={d}>{d}</option>)}</select></div>

                                            </div>

                                                    {addressOptions.length > 1 && (

                                                    <div className="col-span-2"><label className="label">จังหวัด</label><input className="input-modern bg-gray-50" readOnly value={formData.province}/></div>

                                                    <div><label className="label">ลองจิจูด (Lng)</label><input type="text" className="input-modern" value={formData.lng} onChange={e=>setFormData({...formData, lng: e.target.value})}/></div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">

                                                <div className="grid grid-cols-5 gap-4">
                                                    {yg.images.map((img, i) => (
                                                        <div key={i} className="aspect-square bg-gray-100 rounded-lg relative group overflow-hidden">
                                                            <img src={img} className="w-full h-full object-cover"/><button onClick={()=>removePortfolioImageInYear(idx, i)} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100"><X size={12}/></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Users Tab */}
                            {panelTab === 'users' && (
                                <div className="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                    <h3 className="text-2xl font-light mb-8 border-b pb-4">จัดการผู้ดูแลระบบ</h3>
                                    <form onSubmit={handleAddUser} className="flex gap-4 items-end mb-8 bg-gray-50 p-6 rounded-xl">
                                        <div className="flex-1"><label className="label">อีเมล</label><input type="email" required className="input-modern" value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)}/></div>
                                        <div className="flex-1"><label className="label">รหัสผ่าน (ชั่วคราว)</label><input type="text" required minLength={6} className="input-modern" value={invitePassword} onChange={e=>setPassword(e.target.value)}/></div>
                                        <div className="w-32"><label className="label">สิทธิ์</label><select className="input-modern" value={inviteRole} onChange={e=>setInviteRole(e.target.value)}><option value="admin">Admin</option><option value="host">Host</option></select></div>
                                        <button type="submit" className="btn-primary py-2.5">เพิ่ม</button>
                                    </form>
                                    <table className="w-full text-left">
                                        <thead className="bg-gray-50 text-gray-500 text-sm"><tr><th className="p-4 font-normal">อีเมล</th><th className="p-4 font-normal">สถานะ</th><th className="p-4 text-right font-normal">จัดการ</th></tr></thead>
                                        <tbody className="divide-y divide-gray-100 text-sm">
                                            {users.map(u => (
                                                <tr key={u.id}>
                                                    <td className="p-4">{u.email}</td>
                                                    <td className="p-4">
                                                        {u.role === 'pending' || !u.role ? (
                                                            <div className="flex gap-2 items-center"><span className="text-yellow-600 bg-yellow-50 px-2 py-1 rounded">รออนุมัติ</span><button onClick={()=>handleApproveUser(u.id, 'admin', u.email)} className="text-brand-green hover:underline">อนุมัติ Admin</button></div>
                                                        ) : (
                                                            <select value={u.role} onChange={e=>handleUpdateRole(u.id, e.target.value)} disabled={u.email===HOST_EMAIL} className={`p-1.5 border rounded outline-none ${u.role==='admin'?'bg-blue-50 text-blue-700':'bg-brand-light text-brand-green'}`}><option value="admin">Admin</option><option value="host">Host</option><option value="pending">ระงับ</option></select>
                                                        )}
                                                    </td>
                                                    <td className="p-4 text-right">{u.email !== HOST_EMAIL && <button onClick={()=>handleRemoveUser(u.id)} className="text-red-500 hover:underline">ลบ</button>}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
