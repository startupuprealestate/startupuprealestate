            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/;

          const [requestedPropId, setRequestedPropId] = useState(null);

          // 1. Read URL on mount & popstate
          useEffect(() => {
              const syncFromUrl = () => {
                  try {
                      const params = new URLSearchParams(window.location.search);
                      const tab = params.get('tab') || 'home';
                      const propId = params.get('property');
                      const sType = params.get('sType');
                      const sValue = params.get('sValue');

                      setActiveTab(tab);
                      if (sType && sValue) {
                          setSearchParams({ type: sType, value: sValue });
                      }
                      if (propId) {
                          setRequestedPropId(propId);
                      } else {
                          setSelectedProperty(null);
                      }
                  } catch (e) {
                      console.warn("Cannot read URL parameters in this environment.");
                  }
              };

              syncFromUrl();
              window.addEventListener('popstate', syncFromUrl);
              return () => window.removeEventListener('popstate', syncFromUrl);
          }, []);

          // 2. Select property when properties data is ready
          useEffect(() => {
              if (requestedPropId && properties.length > 0) {
                  const prop = properties.find(p => p.id === requestedPropId);
                  if (prop) {
                      setSelectedProperty(prop);
                      setRequestedPropId(null);
                  }
              }
          }, [requestedPropId, properties]);

          // 3. Update URL when state changes
          useEffect(() => {
              const params = new URLSearchParams();
              if (activeTab !== 'home') params.set('tab', activeTab);
              if (selectedProperty) params.set('property', selectedProperty.id);
              if (activeTab === 'search_result' && searchParams.value) {
                  params.set('sType', searchParams.type);
                  params.set('sValue', searchParams.value);
              }
              
              const queryString = params.toString() ? `?${params.toString()}` : '';
              
              try {
                  const currentUrl = window.location.pathname + window.location.search;
                  const newUrl = window.location.pathname + queryString;

                  if (currentUrl !== newUrl && !requestedPropId) {
                      window.history.pushState({}, '', newUrl);
                  }
              } catch (e) {
                  console.warn("URL routing is disabled in this preview environment, but will work when deployed.");
              }
          }, [activeTab, selectedProperty, searchParams, requestedPropId]);

          // 4. Dynamic Title & Meta Tags (เพื่อการแสดงผลใน Browser Tab และ Social บางส่วน)
          useEffect(() => {
              let title = companyInfo?.name || 'STARTUP UP - จุดเริ่มต้นของคนอยากมีบ้าน';
              let ogImage = companyInfo?.logoUrl || 'https://lh3.googleusercontent.com/d/1EEAbI2a89rG4ii0Um0cfWdXLtcb6I_RU';

                  if (!meta) {
                      meta = document.createElement('meta');
                      meta.setAttribute('property', property);
                      document.head.appendChild(meta);
                  }
                  meta.setAttribute('content', content);
              };

              setMeta('og:title', title);
              setMeta('og:image', ogImage);

          }, [selectedProperty, activeTab, searchParams, companyInfo]);

        function PropertiesList({ properties, searchParams, onSelectProp }) {
          let displayProps = properties.filter(p => p.badge !== 'Sold Out');
          let title = 'รายการทั้งหมด';

          if (searchParams?.type === 'promo') {
              displayProps = properties.filter(p => p.badge === 'Promotion');
              title = 'โปรโมชั่นพิเศษ';
          } else if (searchParams?.type === 'main_location') {
              displayProps = properties.filter(p => p.main_location === searchParams.value || (!p.main_location && p.district === searchParams.value));
              title = `ทำเล: ${searchParams.value}`;
          } else if (searchParams?.type === 'sub_location') {
              displayProps = properties.filter(p => p.sub_location === searchParams.value || (!p.sub_location && p.subdistrict === searchParams.value));
              title = `ทำเล: ${searchParams.value}`;
          } else if (searchParams?.type === 'district') {
              displayProps = properties.filter(p => p.district === searchParams.value || (p.subdistrict === 'คูคต' && searchParams.value === 'ลำลูกกา'));
              title = `ทำเล: ${searchParams.value}`;
          } else if (searchParams?.type === 'subdistrict') {
              const keyword = normalizeThaiSearch(searchParams.value); 
              displayProps = properties.filter(p => {
                  const propString = normalizeThaiSearch(`${p.district} ${p.subdistrict} ${p.project_name} ${p.house_number} ${p.soi} ${p.highlights} ${p.category}`);
                  return propString.includes(keyword);
              });
              title = `ผลการค้นหา: ${searchParams.value}`;
          } else if (searchParams?.type === 'keyword') {
              const keyword = normalizeThaiSearch(searchParams.value); 
              displayProps = properties.filter(p => {
                  const propString = normalizeThaiSearch(`${p.main_location} ${p.sub_location} ${p.district} ${p.subdistrict} ${p.project_name} ${p.house_number} ${p.soi} ${p.highlights} ${p.category}`);
                  return propString.includes(keyword);
              });
              title = `ผลการค้นหา: "${searchParams.value}"`;
          }

          return (
            <div className="max-w-7xl mx-auto px-4 py-16 min-h-screen">
              <h2 className="text-2xl font-light text-brand-green mb-10">{title} <span className="text-sm text-gray-400 ml-2">({displayProps.length} รายการ)</span></h2>

                               {p.category}
                           </div>

                                p.badge === 'Sold Out' ? 'bg-red-600 text-white' : 
                                'bg-blue-500 text-white'
                            }`}>{p.badge}</div>}

                               <MapPin size={15} className="flex-shrink-0 text-gray-400" />
                               <span className="font-light truncate">
                                   {p.main_location || p.district} {p.sub_location || p.subdistrict ? `- ${p.sub_location || p.subdistrict}` : ''}
                               </span>

                           <div className="mt-auto pt-4 border-t border-gray-100 flex items-center justify-between">
                               <span className="text-[20px] font-bold text-brand-green"><span className="text-[16px] mr-1">฿</span>{Number(p.price).toLocaleString()}</span>
                               <div className="flex items-center gap-3 text-gray-500 text-[13px]">
                                   <div className="flex items-center gap-1.5" title="พื้นที่"><Maximize size={15} /> {p.area_wah}</div>
                                   <div className="flex items-center gap-1.5" title="ห้องนอน"><Bed size={15} /> {p.bedrooms}</div>

        function LocationSection({ onSelectLocation }) {
          return (
            <div className="max-w-7xl mx-auto px-4 py-16">
              <h2 className="text-3xl font-light text-center text-brand-green mb-12">ทำเลยอดนิยม</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

                       <img src={loc.img} className="w-full h-full object-cover group-hover:scale-105 transition duration-700" alt={loc.area} />

                       </div>
                    </div>

                           <span key={i} onClick={(e) => { e.stopPropagation(); onSelectLocation && onSelectLocation('sub_location', sub); }} className="text-xs border border-gray-200 text-gray-500 px-3 py-1.5 rounded-full hover:border-brand-green hover:text-brand-green transition font-light">
                             {sub}
                           </span>
                       ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        function CalculatorSection({ defaultPrice, minimalist = false }) {
          const [loanAmount, setLoanAmount] = useState(defaultPrice || '');
          const [interest, setInterest] = useState(3);
          const [age, setAge] = useState('');
          const [years, setYears] = useState(0);
          const [monthlyPayment, setMonthlyPayment] = useState(null);

          useEffect(() => { if (defaultPrice) setLoanAmount(defaultPrice); }, [defaultPrice]);
          useEffect(() => { setYears(age ? Math.max(0, Math.min(40, 70 - parseInt(age))) : 0); }, [age]);
            
          const handleCalculate = () => {
            if (years <= 0 || !loanAmount) { setMonthlyPayment(0); return; }
            const r = interest / 100 / 12; const n = years * 12;
            const payment = (Number(loanAmount) * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            setMonthlyPayment(isNaN(payment) ? 0 : payment.toFixed(0));
          };

          return (
            <div className={minimalist ? "" : "max-w-3xl mx-auto bg-white rounded-3xl p-8 md:p-12 shadow-sm border border-gray-100"}>
              {!minimalist && <h2 className="text-2xl font-light text-center text-brand-green mb-8">คำนวณสินเชื่อเบื้องต้น</h2>}
              <div className="space-y-5">
                 <div className={minimalist ? "space-y-4" : "grid grid-cols-2 gap-6"}>
                     <div><label className="label">วงเงินกู้ (บาท)</label><input type="text" inputMode="numeric" value={loanAmount} onChange={e=>setLoanAmount(e.target.value.replace(/[^0-9.]/g, ''))} className="input-modern"/></div>
                     <div className={minimalist ? "grid grid-cols-2 gap-4" : ""} >
                        <div><label className="label">ดอกเบี้ย (%)</label><input type="text" inputMode="numeric" value={interest} onChange={e=>setInterest(e.target.value.replace(/[^0-9.]/g, ''))} className="input-modern"/></div>
                        {!minimalist && <div></div>}
                     </div>
                 </div>
                 
                 <div className="grid grid-cols-2 gap-4">
                     <div><label className="label">อายุผู้กู้ (ปี)</label><input type="text" inputMode="numeric" value={age} onChange={e=>setAge(e.target.value.replace(/[^0-9]/g, ''))} className="input-modern"/></div>
                     <div><label className="label">ระยะเวลา (ปี)</label><div className="input-modern bg-gray-50 text-gray-500 border-transparent">{years > 0 ? `${years} ปี` : '-'}</div></div>
                 </div>

                 <button onClick={handleCalculate} className="w-full bg-brand-green text-white py-3.5 rounded-full font-light mt-4 hover:bg-opacity-90 transition">คำนวณ</button>

                 {monthlyPayment !== null && (
                    <div className="mt-6 text-center p-6 bg-brand-light/30 rounded-2xl">
                       <p className="text-gray-500 text-sm font-light mb-1">ยอดผ่อนชำระต่อเดือนโดยประมาณ</p>
                       <p className="text-3xl font-medium text-brand-green">{Number(monthlyPayment).toLocaleString()} <span className="text-lg">฿</span></p>
                    </div>
                 )}
              </div>
            </div>
          );
        }

        function PortfolioSection({ companyInfo, properties }) {
          const soldOutProperties = properties.filter(p => p.badge === 'Sold Out');
          const portfolioYears = companyInfo?.portfolio_years || [];

          return (
            <div className="max-w-7xl mx-auto px-4 py-16">
              <h2 className="text-3xl font-light text-center text-brand-green mb-16">ผลงานของเรา</h2>
                
              {soldOutProperties.length === 0 && portfolioYears.length === 0 && (
                 <p className="text-center text-gray-400 font-light py-20">ยังไม่มีรายการผลงานในขณะนี้</p>
              )}

              {soldOutProperties.length > 0 && (
                <div className="mb-16">
                   <h3 className="text-xl font-light text-gray-500 mb-6 uppercase tracking-widest border-b pb-2">Sold Out</h3>
                   <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                      {soldOutProperties.map(p => (
                        <div key={p.id} className="group relative aspect-[4/5] rounded-xl overflow-hidden bg-gray-100">
                           <img src={p.images?.[0] || p.imageUrl} className="w-full h-full object-cover grayscale opacity-70 group-hover:grayscale-0 transition duration-500"/>
                           <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-4">
                              <span className="text-white text-xs tracking-wider mb-1 opacity-70">SOLD</span>
                              <p className="text-white text-sm font-light truncate">{p.project_name}</p>
                           </div>
                        </div>
                      ))}
                   </div>
                </div>
              )}
                
              {portfolioYears.length > 0 && portfolioYears.sort((a,b) => b.year - a.year).map((yearGroup, idx) => (
                 <div key={idx} className="mb-16">
                    <h3 className="text-xl font-light text-gray-500 mb-6 uppercase tracking-widest border-b pb-2">Year {yearGroup.year}</h3>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                       {yearGroup.images.map((img, i) => (
                          <div key={i} className="aspect-square rounded-xl overflow-hidden bg-gray-100">
                              <img src={img} className="w-full h-full object-cover hover:scale-105 transition duration-500"/>
                          </div>
                       ))}
                    </div>
                 </div>
              ))}
            </div>
          );
        }

        function NavButton({ active, onClick, children }) {
          return (
            <button onClick={onClick} className={`text-sm tracking-wide transition-colors duration-300 ${active ? 'text-brand-green font-medium' : 'text-gray-500 hover:text-brand-green'}`}>
              {children}
            </button>
          );
        }
        function MobileNavBtn({ onClick, children }) {
          return <button onClick={onClick} className="block w-full text-left py-2 text-base font-light text-gray-600 hover:text-brand-green">{children}</button>;
        }

        function LoginModal({ onClose, onLogin, onSignup }) {
           const [isLogin, setIsLogin] = useState(true); const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [loading, setLoading] = useState(false); const [message, setMessage] = useState({ type: '', text: '' });
           const handleSubmit = async (e) => {
             e.preventDefault(); if (!email || !password) return; setLoading(true); setMessage({ type: '', text: '' });
             try { if (isLogin) { await onLogin(email, password); } else { const msg = await onSignup(email, password); setMessage({ type: 'success', text: msg }); setTimeout(() => { if (onClose) onClose(); }, 3000); } } catch (err) { setMessage({ type: 'error', text: err.message }); } setLoading(false);
           };
           return (
             <div className="fixed inset-0 z-[70] bg-black/50 flex items-center justify-center p-4 backdrop-blur-sm">
               <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full p-8 relative">
                 <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><X size={20}/></button>
                 <h3 className="text-xl font-light text-brand-green mb-6 text-center">{isLogin ? 'ระบบจัดการหลังบ้าน' : 'สมัครสิทธิ์การเข้าใช้งาน'}</h3>
                 {message.text && <div className={`p-3 rounded-lg mb-4 text-sm font-light ${message.type === 'error' ? 'bg-red-50 text-red-600' : 'bg-brand-light text-brand-green'}`}>{message.text}</div>}
                 <form onSubmit={handleSubmit} className="space-y-4">
                   <input type="email" required placeholder="อีเมล" className="input-modern bg-gray-50 border-transparent" value={email} onChange={e => setEmail(e.target.value)} />
                   <input type="password" required placeholder="รหัสผ่าน" className="input-modern bg-gray-50 border-transparent" value={password} onChange={e => setPassword(e.target.value)} />
                   <button type="submit" disabled={loading} className="w-full bg-brand-green text-white py-3 rounded-full font-light mt-4 disabled:opacity-50">{loading ? 'กำลังโหลด...' : (isLogin ? 'เข้าสู่ระบบ' : 'ลงทะเบียน')}</button>
                 </form>
                 <div className="mt-6 text-center text-sm font-light"><span className="text-gray-400">{isLogin ? 'ยังไม่มีบัญชี?' : 'มีบัญชีอยู่แล้ว?'} </span><button onClick={() => { setIsLogin(!isLogin); setMessage({ type: '', text: '' }); }} className="text-brand-green hover:underline">{isLogin ? 'ลงทะเบียน' : 'เข้าสู่ระบบ'}</button></div>
               </div>
             </div>
           );
        }

        // --- Custom Alert Modal Component ---
        function CustomAlertModal({ isOpen, type, title, message, onConfirm, onCancel, showCancel }) {
            if (!isOpen) return null;
            const Icon = type === 'warning' ? AlertTriangle : type === 'error' ? XCircle : type === 'success' ? CheckCircle : AlertCircle;
            const iconColor = type === 'warning' ? 'text-yellow-500' : type === 'error' ? 'text-red-500' : type === 'success' ? 'text-green-500' : 'text-blue-500';
            
            return (
                <div className="fixed inset-0 z-[120] bg-black/50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
                    <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 text-center animate-in zoom-in-95 duration-200">
                        <div className="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-gray-50 mb-4">
                            <Icon className={`h-8 w-8 ${iconColor}`} />
                        </div>
                        <h3 className="text-xl font-medium text-gray-900 mb-2">{title}</h3>
                        <p className="text-sm text-gray-500 mb-8">{message}</p>
                        <div className="flex gap-3 justify-center">
                            {showCancel && (
                                <button onClick={onCancel} className="px-5 py-2.5 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-full font-medium text-sm transition flex-1">ยกเลิก</button>
                            )}
                            <button onClick={onConfirm} className={`px-5 py-2.5 text-white rounded-full font-medium text-sm transition flex-1 ${type === 'error' ? 'bg-red-500 hover:bg-red-600' : type === 'warning' ? 'bg-brand-green hover:bg-[#135c2a]' : 'bg-brand-green hover:bg-[#135c2a]'}`}>ตกลง</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- FULL ADMIN PANEL ---
        function AdminPanel({ userRole, userEmail, properties, users, companyInfo, onClose, onLogout, db, appId }) {
            const [panelTab, setPanelTab] = useState('properties'); 
            const [isEditing, setIsEditing] = useState(false);
            const [editData, setEditData] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);

            // Custom Alert State
            const [alertConfig, setAlertConfig] = useState({ isOpen: false, type: 'info', title: '', message: '', onConfirm: null, showCancel: false });

            const showAlert = (title, message, type = 'info') => {
                setAlertConfig({ isOpen: true, type, title, message, showCancel: false, onConfirm: () => setAlertConfig(prev => ({...prev, isOpen: false})) });
            };

            const showConfirm = (title, message, onConfirmCallback) => {
                setAlertConfig({
                    isOpen: true,
                    type: 'warning',
                    title,
                    message,
                    showCancel: true,
                    onCancel: () => setAlertConfig(prev => ({...prev, isOpen: false})),
                    onConfirm: () => {
                        setAlertConfig(prev => ({...prev, isOpen: false}));
                        if(onConfirmCallback) onConfirmCallback();
                    }
                });
            };

            // Uploading states
            const [isUploadingImgs, setIsUploadingImgs] = useState(false);
            const [isUploadingLogo, setIsUploadingLogo] = useState(false);
            const [isUploadingPortfolio, setIsUploadingPortfolio] = useState({ state: false, index: -1 });

            // Forms
            const initialForm = { project_name: '', category: 'ทาวน์เฮาส์', price: '', status: 'available', badge: '', house_number: '', soi: '', zipcode: '', subdistrict: '', district: '', province: '', area_wah: '', area_sqm: '', floors: '', bedrooms: '', bathrooms: '', parking: '', direction: '', lat: '', lng: '', highlights: '', facilitiesList: [], images: [], youtubeUrl: '', main_location: '', sub_location: '' };
            const [formData, setFormData] = useState(initialForm);
            const [imagesPreview, setImagesPreview] = useState([]);
            const [addressOptions, setAddressOptions] = useState([]);
            const [companyForm, setCompanyForm] = useState(companyInfo || DEFAULT_COMPANY_INFO);
            const [newPortfolioYear, setNewPortfolioYear] = useState('');
            const [inviteEmail, setInviteEmail] = useState(''); const [invitePassword, setPassword] = useState(''); const [inviteRole, setInviteRole] = useState('admin');
            const [newFacility, setNewFacility] = useState('');
            const [thaiAddressData, setThaiAddressData] = useState({});

            // Cloudinary Config
            const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dm2wr55r5/image/upload';
            const CLOUDINARY_PRESET = 'my_house_preset';

            useEffect(() => { if (companyInfo) setCompanyForm(companyInfo); }, [companyInfo]);

            useEffect(() => {
                // Fetch full Thai address database
                fetch('https://raw.githubusercontent.com/earthchie/jquery.Thailand.js/master/jquery.Thailand.js/database/raw_database/raw_database.json')
                    .then(res => res.json())
                    .then(data => {
                        const db = {};
                        data.forEach(item => {
                            const zip = item.zipcode.toString();
                            if(!db[zip]) db[zip] = [];
                            if(!db[zip].find(x => x.subdistrict === item.district && x.district === item.amphoe && x.province === item.province)) {
                                db[zip].push({ subdistrict: item.district, district: item.amphoe, province: item.province });
                            }
                        });
                        setThaiAddressData(db);
                    })
                    .catch(err => console.error('Failed to load thai address data', err));
            }, []);

            const filteredProperties = properties.filter(p => p.project_name.toLowerCase().includes(searchTerm.toLowerCase()));

            const startEdit = (prop) => {
                setEditData(prop); setFormData({ ...initialForm, ...prop, facilitiesList: prop.facilitiesList || [] }); setImagesPreview(prop.images || (prop.imageUrl ? [prop.imageUrl] : []));
                if (prop.zipcode && thaiAddressData[prop.zipcode]) setAddressOptions(thaiAddressData[prop.zipcode]); else setAddressOptions([]);
                setIsEditing(true);
            };
            const startNew = () => { setEditData(null); setFormData(initialForm); setImagesPreview([]); setAddressOptions([]); setIsEditing(true); };

            const handleZipcodeChange = (e) => {
                const code = e.target.value; setFormData(prev => ({ ...prev, zipcode: code }));
                if (thaiAddressData && thaiAddressData[code]) { 
                    setAddressOptions(thaiAddressData[code]); 
                    if (thaiAddressData[code].length === 1) { 
                        const addr = thaiAddressData[code][0]; 
                        setFormData(prev => ({ ...prev, zipcode: code, subdistrict: addr.subdistrict, district: addr.district, province: addr.province, })); 
                    } else { 
                        setFormData(prev => ({ ...prev, zipcode: code, subdistrict: '', district: '', province: '' })); 
                    } 
                } else { 
                    setAddressOptions([]); 
                }
            };
            const handleAddressSelect = (e) => { const index = e.target.value; if (index === "") return; const addr = addressOptions[index]; setFormData(prev => ({ ...prev, subdistrict: addr.subdistrict, district: addr.district, province: addr.province, })); };

            // Helper function to upload a single file via fetch
            const uploadFileToCloudinary = async (file) => {
                const fd = new FormData();
                fd.append('file', file);
                fd.append('upload_preset', CLOUDINARY_PRESET);

                try {
                    const response = await fetch(CLOUDINARY_URL, {
                        method: 'POST',
                        body: fd
                    });
                    const data = await response.json();
                    
                    if (data.secure_url) {
                        return data.secure_url;
                    } else {
                        console.error("Cloudinary Error:", data);
                        throw new Error(data.error?.message || "อัปโหลดไม่สำเร็จ (โปรดเช็คว่า Upload Preset เป็น Unsigned)");
                    }
                } catch (error) {
                    throw error;
                }
            };

            // 1. Upload Properties Images
            const handlePropertyImageUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                
                // Limit max files
                const allowedFiles = files.slice(0, 10 - imagesPreview.length);
                if (allowedFiles.length === 0) { showAlert('แจ้งเตือน', 'อัปโหลดได้สูงสุด 10 รูปครับ', 'warning'); return; }

                setIsUploadingImgs(true);
                try {
                    const uploadedUrls = [];
                    for (const file of allowedFiles) {
                        const url = await uploadFileToCloudinary(file);
                        uploadedUrls.push(url);
                    }
                    
                    setImagesPreview(prev => {
                        const newArr = [...prev, ...uploadedUrls];
                        setFormData(fd => ({ ...fd, images: newArr }));
                        return newArr;
                    });
                } catch (error) {
                    showAlert('อัปโหลดผิดพลาด', error.message, 'error');
                } finally {
                    setIsUploadingImgs(false);
                    e.target.value = null; // reset input
                }
            };

            // 2. Upload Logo
            const handleLogoUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsUploadingLogo(true);
                try {
                    const url = await uploadFileToCloudinary(file);
                    setCompanyForm(prev => ({...prev, logoUrl: url}));
                } catch (error) {
                    showAlert('อัปโหลดผิดพลาด', error.message, 'error');
                } finally {
                    setIsUploadingLogo(false);
                    e.target.value = null;
                }
            };

            // 3. Upload Portfolio Images
            const handlePortfolioUpload = async (e, yearIndex) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;

                setIsUploadingPortfolio({ state: true, index: yearIndex });
                try {
                    const uploadedUrls = [];
                    for (const file of files) {
                        const url = await uploadFileToCloudinary(file);
                        uploadedUrls.push(url);
                    }
                    
                    setCompanyForm(prev => {
                        const updatedYears = [...(prev.portfolio_years || [])];
                        updatedYears[yearIndex].images = [...(updatedYears[yearIndex].images || []), ...uploadedUrls];
                        return { ...prev, portfolio_years: updatedYears };
                    });
                } catch (error) {
                    showAlert('อัปโหลดผิดพลาด', error.message, 'error');
                } finally {
                    setIsUploadingPortfolio({ state: false, index: -1 });
                    e.target.value = null;
                }
            };

            const removeImage = (idx) => { const updated = imagesPreview.filter((_, i) => i !== idx); setImagesPreview(updated); setFormData(prev => ({ ...prev, images: updated })); };
            
            const handleFacilityChange = (e) => { const val = e.target.value; if (val && !formData.facilitiesList?.includes(val)) setFormData(prev => ({ ...prev, facilitiesList: [...(prev.facilitiesList || []), val] })); };
            const addCustomFacility = () => { if(newFacility && !formData.facilitiesList?.includes(newFacility)) { setFormData(prev => ({ ...prev, facilitiesList: [...(prev.facilitiesList || []), newFacility] })); setNewFacility(''); } };
            const removeFacility = (fac) => { setFormData(prev => ({ ...prev, facilitiesList: prev.facilitiesList.filter(f => f !== fac) })); };

            // Save Property Data (เชื่อมต่อ Firebase)
            const handleSaveProperty = async (e) => {
                if (e) e.preventDefault();
                
                // 1. ตรวจสอบข้อมูลบังคับก่อนบันทึก
                if (!formData.project_name || !formData.price) {
                    showAlert('ข้อมูลไม่ครบถ้วน', 'กรุณากรอกชื่อโครงการและราคาให้ครบถ้วน', 'warning');
                    return;
                }

                setIsSaving(true); // เริ่มแสดงหน้าจอโหลด (ตัวหมุนจะเริ่มทำงาน)
                
                try {
                    // 2. เตรียมข้อมูลและจัดการค่า Lat/Lng, ตัวเลข ให้ปลอดภัย
                    const safeLat = formData.lat ? String(formData.lat).trim() : '';
                    const safeLng = formData.lng ? String(formData.lng).trim() : '';
                    
                    const dataToSave = {
                        ...formData,
                        project_name: formData.project_name.trim(),
                        lat: safeLat,
                        lng: safeLng,
                        price: Number(formData.price) || 0,
                        bedrooms: Number(formData.bedrooms) || 0,
                        bathrooms: Number(formData.bathrooms) || 0,
                        area_wah: Number(formData.area_wah) || 0,
                        main_location: formData.main_location || '',
                        sub_location: formData.sub_location || '',
                        updatedAt: serverTimestamp()
                    };

                    // 3. กำหนด Path ให้ชัดเจน (ตรวจสอบว่าใช้ db และ appId จาก props)
                    // โครงสร้าง: artifacts > [appId] > public > data > properties
                    const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'properties');

                    if (editData && editData.id) {
                        // กรณีแก้ไขข้อมูลเดิม
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'properties', editData.id);
                        await updateDoc(docRef, dataToSave);
                    } else {
                        // กรณีเพิ่มข้อมูลใหม่
                        await addDoc(collectionRef, {
                            ...dataToSave,
                            createdAt: serverTimestamp()
                        });
                    }

                    // 4. บันทึกสำเร็จ
                    setSaveSuccess(true); 

                } catch (err) {
                    // 5. หากเกิด Error ให้แสดงแจ้งเตือน
                    console.error("Save Error Details:", err);
                    showAlert('บันทึกไม่สำเร็จ', err.message, 'error');
                } finally {
                    // 6. *** สำคัญมาก *** ไม่ว่าจะสำเร็จหรือพัง ต้องปิดหน้าจอโหลด
                    // เพื่อไม่ให้หน้าจอหมุนค้าง
                    setIsSaving(false);
                }
            };

            const closeSuccessOverlay = () => { setSaveSuccess(false); setIsEditing(false); setEditData(null); setFormData(initialForm); setImagesPreview([]); };

            const handleDeleteProperty = (id) => { 
                showConfirm('ยืนยันการลบ', 'คุณต้องการลบข้อมูลบ้านหลังนี้ใช่หรือไม่?', async () => {
                    setIsSaving(true); 
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'properties', id));
                    } catch (error) {
                        showAlert('ผิดพลาด', error.message, 'error');
                    } finally {
                        setIsSaving(false); 
                    }
                });
            };

            const handleSaveCompany = async (e) => { 
                e.preventDefault(); 
                setIsSaving(true); 
                const companyDataToSave = { ...companyForm }; 
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'company_info', 'main'), companyDataToSave); 
                setCompanyForm(companyDataToSave); 
                setIsSaving(false); 
                setSaveSuccess(true); 
            };

            const handleAddYear = () => { if(!newPortfolioYear) return; const currentYears = companyForm.portfolio_years || []; if(currentYears.find(y => y.year === newPortfolioYear)) { showAlert('แจ้งเตือน', 'มีปีนี้อยู่แล้ว', 'warning'); return; } setCompanyForm({ ...companyForm, portfolio_years: [...currentYears, { year: newPortfolioYear, images: [] }] }); setNewPortfolioYear(''); };
            const handleDeleteYear = (year) => { 
                showConfirm('ยืนยันการลบ', `ยืนยันการลบข้อมูลผลงานปี ${year}?`, () => {
                    setCompanyForm({ ...companyForm, portfolio_years: companyForm.portfolio_years.filter(y => y.year !== year) });
                });
            };
            const removePortfolioImageInYear = (yearIndex, imgIndex) => { const updatedYears = [...companyForm.portfolio_years]; updatedYears[yearIndex].images = updatedYears[yearIndex].images.filter((_, i) => i !== imgIndex); setCompanyForm({ ...companyForm, portfolio_years: updatedYears }); };
            
            const handleSavePortfolio = async () => { 
                setIsSaving(true); 
                const dataToSave = { ...companyForm }; 
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'company_info', 'main'), dataToSave); 
                setCompanyForm(dataToSave); 
                setIsSaving(false); 
                setSaveSuccess(true); 
            };

            const handleAddUser = async (e) => { 
                e.preventDefault(); 
                if (!inviteEmail || !invitePassword) return; 
                try { 
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', inviteEmail.toLowerCase().trim()), { email: inviteEmail.toLowerCase().trim(), password: invitePassword, role: inviteRole, addedBy: userEmail, createdAt: serverTimestamp() }); 
                    setInviteEmail(''); 
                    setPassword(''); 
                    showAlert('สำเร็จ', 'เพิ่มผู้ใช้เรียบร้อยแล้ว', 'success'); 
                } catch (err) { 
                    showAlert('ผิดพลาด', err.message, 'error'); 
                } 
            };
            const handleUpdateRole = (userId, newRole) => { 
                showConfirm('ยืนยันการเปลี่ยนสิทธิ์', `ยืนยันเปลี่ยนสิทธิ์เป็น ${newRole}?`, async () => {
                    try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { role: newRole }); } 
                    catch (err) { showAlert('ผิดพลาด', err.message, 'error'); }
                });
            };
            const handleApproveUser = (userId, role, email) => { 
                showConfirm('ยืนยันการอนุมัติ', `อนุมัติสิทธิ์ ${role} ให้ ${email}?`, async () => {
                    try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { role: role }); } 
                    catch (err) { showAlert('ผิดพลาด', err.message, 'error'); }
                });
            };
            const handleRemoveUser = (id) => { 
                showConfirm('ยืนยันการลบ', 'ลบสิทธิ์ผู้ใช้นี้?', async () => {
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id)); } 
                    catch (err) { showAlert('ผิดพลาด', err.message, 'error'); }
                });
            };

            return (
                <div className="fixed inset-0 z-[60] bg-gray-50 flex flex-col font-sans">
                    {/* Loaders */}
                    {isSaving && <div className="absolute inset-0 z-[100] bg-black/60 flex flex-col items-center justify-center text-white backdrop-blur-sm"><Loader size={48} className="animate-spin mb-4"/><h3 className="font-light">กำลังบันทึก...</h3></div>}
                    {saveSuccess && <div className="absolute inset-0 z-[100] bg-black/60 flex items-center justify-center backdrop-blur-sm"><div className="bg-white p-8 rounded-2xl text-center"><Check size={40} className="mx-auto text-green-500 mb-4"/><h3 className="mb-4">บันทึกสำเร็จ</h3><button onClick={closeSuccessOverlay} className="btn-primary w-full">ตกลง</button></div></div>}

                    {/* Custom Alert Modal */}
                    <CustomAlertModal 
                        isOpen={alertConfig.isOpen} 
                        type={alertConfig.type} 
                        title={alertConfig.title} 
                        message={alertConfig.message} 
                        showCancel={alertConfig.showCancel} 
                        onCancel={alertConfig.onCancel} 
                        onConfirm={alertConfig.onConfirm} 
                    />

                    {/* Admin Header */}
                    <div className="bg-white border-b px-6 py-4 flex justify-between items-center z-10">
                        <div className="flex items-center gap-3">
                            <span className="text-xl font-light text-brand-green tracking-widest uppercase">Admin Panel</span>
                            <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">{userRole}</span>
                        </div>
                        <div className="flex gap-4 items-center">
                            <button onClick={onClose} className="text-sm text-gray-500 hover:text-black transition">กลับหน้าเว็บ</button>
                            <button onClick={onLogout} className="text-sm bg-red-50 text-red-500 px-4 py-1.5 rounded-full hover:bg-red-50 hover:text-white transition">ออกจากระบบ</button>
                        </div>
                    </div>

                    {/* Admin Body */}
                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}

                                <div className="max-w-4xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                                    <h3 className="text-2xl font-light mb-8 border-b pb-4">จัดการผู้ดูแลระบบ</h3>
                                    <form onSubmit={handleAddUser} className="flex flex-col md:flex-row gap-4 items-start md:items-end mb-8 bg-gray-50 p-6 rounded-xl">
                                        <div className="w-full md:flex-1"><label className="label">อีเมล</label><input type="email" required className="input-modern" value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)}/></div>
                                        <div className="w-full md:flex-1"><label className="label">รหัสผ่าน (ชั่วคราว)</label><input type="text" required minLength={6} className="input-modern" value={invitePassword} onChange={e=>setPassword(e.target.value)}/></div>
                                        <div className="w-full md:w-32"><label className="label">สิทธิ์</label><select className="input-modern" value={inviteRole} onChange={e=>setInviteRole(e.target.value)}><option value="admin">Admin</option><option value="host">Host</option></select></div>
                                        <button type="submit" className="btn-primary py-2.5 w-full md:w-auto">เพิ่มผู้ใช้</button>
                                    </form>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left min-w-[500px]">
                                            <thead className="bg-gray-50 text-gray-500 text-sm"><tr><th className="p-4 font-normal">อีเมล</th><th className="p-4 font-normal">สถานะ/สิทธิ์</th><th className="p-4 text-right font-normal">จัดการ</th></tr></thead>
                                            <tbody className="divide-y divide-gray-100 text-sm">
                                                {users.map(u => (
                                                    <tr key={u.id}>
                                                        <td className="p-4">{u.email}</td>
                                                        <td className="p-4">
                                                            {u.role === 'pending' || !u.role ? (
                                                                <div className="flex gap-2 items-center"><span className="text-yellow-600 bg-yellow-50 px-2 py-1 rounded text-xs">รออนุมัติ</span><button onClick={()=>handleApproveUser(u.id, 'admin', u.email)} className="text-brand-green hover:underline">อนุมัติ Admin</button></div>
                                                            ) : (
                                                                <select value={u.role} onChange={e=>handleUpdateRole(u.id, e.target.value)} disabled={u.email===HOST_EMAIL} className={`p-1.5 border rounded outline-none text-xs ${u.role==='admin'?'bg-blue-50 text-blue-700 border-blue-200':'bg-brand-light text-brand-green border-brand-green/20'}`}><option value="admin">Admin</option><option value="host">Host</option><option value="pending">ระงับสิทธิ์</option></select>
                                                            )}
                                                        </td>
                                                        <td className="p-4 text-right">{u.email !== HOST_EMAIL && <button onClick={()=>handleRemoveUser(u.id)} className="text-red-500 hover:bg-red-50 px-3 py-1 rounded transition">ลบ</button>}</td>
                                                    </tr>
                                                ))}
                                                {users.length === 0 && <tr><td colSpan="3" className="text-center p-8 text-gray-400">ไม่พบข้อมูลผู้ดูแลระบบ</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
