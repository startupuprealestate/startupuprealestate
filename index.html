        const resizeImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (event) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1000; const MAX_HEIGHT = 1000;
                let width = img.width; let height = img.height;
                if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.8)); 
              };
              img.src = event.target.result;
            };
            reader.readAsDataURL(file);
          });
        };

        const uploadBase64ToStorage = async (base64String) => {
          if (!base64String || base64String.startsWith('http')) return base64String;
          const arr = base64String.split(',');
          const mime = arr[0].match(/:(.*?);/)[1];
          const bstr = atob(arr[1]);
          let n = bstr.length;
          const u8arr = new Uint8Array(n);
          while(n--){ u8arr[n] = bstr.charCodeAt(n); }
          const blob = new Blob([u8arr], {type:mime});
          const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2, 9)}.jpg`;
          const storageRef = ref(storage, fileName);
          await uploadBytes(storageRef, blob);
          return await getDownloadURL(storageRef);

        // --- Calculator Section ---
        function CalculatorSection({ defaultPrice, minimalist = false }) {
          const [loanAmount, setLoanAmount] = useState(defaultPrice || '');
          const [interest, setInterest] = useState(3);
          const [age, setAge] = useState('');
          const [years, setYears] = useState(0);
          const [monthlyPayment, setMonthlyPayment] = useState(null);

          useEffect(() => { if (defaultPrice) setLoanAmount(defaultPrice); }, [defaultPrice]);
          useEffect(() => { setYears(age ? Math.max(0, Math.min(40, 70 - parseInt(age))) : 0); }, [age]);
            
          const handleCalculate = () => {
            if (years <= 0 || !loanAmount) { setMonthlyPayment(0); return; }
            const r = interest / 100 / 12; const n = years * 12;
            const payment = (Number(loanAmount) * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            setMonthlyPayment(isNaN(payment) ? 0 : payment.toFixed(0));
          };

          return (
            <div className={minimalist ? "" : "max-w-3xl mx-auto bg-white rounded-3xl p-8 md:p-12 shadow-sm border border-gray-100"}>
              {!minimalist && <h2 className="text-2xl font-light text-center text-brand-green mb-8">คำนวณสินเชื่อเบื้องต้น</h2>}

                     <div><label className="label">วงเงินกู้ (บาท)</label><input type="number" value={loanAmount} onChange={e=>setLoanAmount(e.target.value)} className="input-modern"/></div>
                     <div className={minimalist ? "grid grid-cols-2 gap-4" : ""} >
                        <div><label className="label">ดอกเบี้ย (%)</label><input type="number" step="0.1" value={interest} onChange={e=>setInterest(Number(e.target.value))} className="input-modern"/></div>
                        {!minimalist && <div></div> /* spacing */}
                     </div>
                 </div>
                 
                 <div className="grid grid-cols-2 gap-4">
                     <div><label className="label">อายุผู้กู้ (ปี)</label><input type="number" min="20" max="70" value={age} onChange={e=>setAge(e.target.value)} className="input-modern"/></div>
                     <div><label className="label">ระยะเวลา (ปี)</label><div className="input-modern bg-gray-50 text-gray-500 border-transparent">{years > 0 ? `${years} ปี` : '-'}</div></div>
                 </div>

                 <button onClick={handleCalculate} className="w-full bg-brand-green text-white py-3.5 rounded-full font-light mt-4 hover:bg-opacity-90 transition">คำนวณ</button>

                 {monthlyPayment !== null && (
                    <div className="mt-6 text-center p-6 bg-brand-light/30 rounded-2xl">
                       <p className="text-gray-500 text-sm font-light mb-1">ยอดผ่อนชำระต่อเดือนโดยประมาณ</p>
                       <p className="text-3xl font-medium text-brand-green">{Number(monthlyPayment).toLocaleString()} <span className="text-lg">฿</span></p>
                    </div>
                 )}
              </div>
            </div>
          );
        }

        // --- Portfolio Section ---
        function PortfolioSection({ companyInfo, properties }) {
          const soldOutProperties = properties.filter(p => p.badge === 'Sold Out');
          const portfolioYears = companyInfo?.portfolio_years || [];

          return (
            <div className="max-w-7xl mx-auto px-4 py-16">
              <h2 className="text-3xl font-light text-center text-brand-green mb-16">ผลงานของเรา</h2>
                
              {soldOutProperties.length === 0 && portfolioYears.length === 0 && (
                 <p className="text-center text-gray-400 font-light py-20">ยังไม่มีรายการผลงานในขณะนี้</p>
              )}

              {soldOutProperties.length > 0 && (
                <div className="mb-16">
                   <h3 className="text-xl font-light text-gray-500 mb-6 uppercase tracking-widest border-b pb-2">Sold Out</h3>
                   <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                      {soldOutProperties.map(p => (
                        <div key={p.id} className="group relative aspect-[4/5] rounded-xl overflow-hidden bg-gray-100">
                           <img src={p.images?.[0] || p.imageUrl} className="w-full h-full object-cover grayscale opacity-70 group-hover:grayscale-0 transition duration-500"/>
                           <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-4">
                              <span className="text-white text-xs tracking-wider mb-1 opacity-70">SOLD</span>
                              <p className="text-white text-sm font-light truncate">{p.project_name}</p>
                           </div>
                        </div>
                      ))}
                   </div>
                </div>
              )}
                
              {portfolioYears.length > 0 && portfolioYears.sort((a,b) => b.year - a.year).map((yearGroup, idx) => (
                 <div key={idx} className="mb-16">
                    <h3 className="text-xl font-light text-gray-500 mb-6 uppercase tracking-widest border-b pb-2">Year {yearGroup.year}</h3>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                       {yearGroup.images.map((img, i) => (
                          <div key={i} className="aspect-square rounded-xl overflow-hidden bg-gray-100">
                              <img src={img} className="w-full h-full object-cover hover:scale-105 transition duration-500"/>
                          </div>
                       ))}
                    </div>
                 </div>
              ))}
            </div>
          );
        }

        // --- Layout Helpers ---
        function NavButton({ active, onClick, children }) {
          return (
            <button onClick={onClick} className={`text-sm tracking-wide transition-colors duration-300 ${active ? 'text-brand-green font-medium' : 'text-gray-500 hover:text-brand-green'}`}>
              {children}
            </button>
          );
        }
        function MobileNavBtn({ onClick, children }) {
          return <button onClick={onClick} className="block w-full text-left py-2 text-base font-light text-gray-600 hover:text-brand-green">{children}</button>;
        }

        // --- Admin Components (Keeping Logic, Updating Styling lightly) ---
        function LoginModal({ onClose, onLogin, onSignup }) {
           const [isLogin, setIsLogin] = useState(true); const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [loading, setLoading] = useState(false); const [message, setMessage] = useState({ type: '', text: '' });
           const handleSubmit = async (e) => {
             e.preventDefault(); if (!email || !password) return; setLoading(true); setMessage({ type: '', text: '' });
             try { if (isLogin) { await onLogin(email, password); } else { const msg = await onSignup(email, password); setMessage({ type: 'success', text: msg }); setTimeout(() => { if (onClose) onClose(); }, 3000); } } catch (err) { setMessage({ type: 'error', text: err.message }); } setLoading(false);
           };
           return (
             <div className="fixed inset-0 z-[70] bg-black/50 flex items-center justify-center p-4 backdrop-blur-sm">
               <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full p-8 relative">
                 <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><X size={20}/></button>
                 <h3 className="text-xl font-light text-brand-green mb-6 text-center">{isLogin ? 'ระบบจัดการหลังบ้าน' : 'สมัครสิทธิ์การเข้าใช้งาน'}</h3>
                 {message.text && <div className={`p-3 rounded-lg mb-4 text-sm font-light ${message.type === 'error' ? 'bg-red-50 text-red-600' : 'bg-brand-light text-brand-green'}`}>{message.text}</div>}
                 <form onSubmit={handleSubmit} className="space-y-4">
                   <input type="email" required placeholder="อีเมล" className="input-modern bg-gray-50 border-transparent" value={email} onChange={e => setEmail(e.target.value)} />
                   <input type="password" required placeholder="รหัสผ่าน" className="input-modern bg-gray-50 border-transparent" value={password} onChange={e => setPassword(e.target.value)} />
                   <button type="submit" disabled={loading} className="w-full bg-brand-green text-white py-3 rounded-full font-light mt-4 disabled:opacity-50">{loading ? 'กำลังโหลด...' : (isLogin ? 'เข้าสู่ระบบ' : 'ลงทะเบียน')}</button>
                 </form>
                 <div className="mt-6 text-center text-sm font-light"><span className="text-gray-400">{isLogin ? 'ยังไม่มีบัญชี?' : 'มีบัญชีอยู่แล้ว?'} </span><button onClick={() => { setIsLogin(!isLogin); setMessage({ type: '', text: '' }); }} className="text-brand-green hover:underline">{isLogin ? 'ลงทะเบียน' : 'เข้าสู่ระบบ'}</button></div>
               </div>
             </div>
           );
        }

        // --- FULL ADMIN PANEL ---
        function AdminPanel({ userRole, userEmail, properties, users, companyInfo, onClose, onLogout, appId, db }) {
            const [panelTab, setPanelTab] = useState('properties'); 
            const [isEditing, setIsEditing] = useState(false);
            const [editData, setEditData] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);

            // Forms
            const initialForm = { project_name: '', category: 'ทาวน์เฮาส์', price: '', status: 'available', badge: '', house_number: '', soi: '', zipcode: '', subdistrict: '', district: '', province: '', area_wah: '', area_sqm: '', floors: '', bedrooms: '', bathrooms: '', parking: '', direction: '', lat: '', lng: '', highlights: '', facilitiesList: [], images: [], youtubeUrl: '' };
            const [formData, setFormData] = useState(initialForm);
            const [imagesPreview, setImagesPreview] = useState([]);
            const [addressOptions, setAddressOptions] = useState([]);
            const [companyForm, setCompanyForm] = useState(companyInfo || DEFAULT_COMPANY_INFO);
            const [newPortfolioYear, setNewPortfolioYear] = useState('');
            const [inviteEmail, setInviteEmail] = useState(''); const [invitePassword, setInvitePassword] = useState(''); const [inviteRole, setInviteRole] = useState('admin');
            const [newFacility, setNewFacility] = useState('');

            useEffect(() => { if (companyInfo) setCompanyForm(companyInfo); }, [companyInfo]);

            const filteredProperties = properties.filter(p => p.project_name.toLowerCase().includes(searchTerm.toLowerCase()));

            const startEdit = (prop) => {
                setEditData(prop); setFormData({ ...initialForm, ...prop, facilitiesList: prop.facilitiesList || [] }); setImagesPreview(prop.images || (prop.imageUrl ? [prop.imageUrl] : []));
                if (prop.zipcode && THAI_ADDRESS_DB[prop.zipcode]) setAddressOptions(THAI_ADDRESS_DB[prop.zipcode]); else setAddressOptions([]);
                setIsEditing(true);
            };
            const startNew = () => { setEditData(null); setFormData(initialForm); setImagesPreview([]); setAddressOptions([]); setIsEditing(true); };

            const handleZipcodeChange = (e) => {
                const code = e.target.value; setFormData(prev => ({ ...prev, zipcode: code }));
                if (THAI_ADDRESS_DB[code]) { setAddressOptions(THAI_ADDRESS_DB[code]); if (THAI_ADDRESS_DB[code].length === 1) { const addr = THAI_ADDRESS_DB[code][0]; setFormData(prev => ({ ...prev, zipcode: code, subdistrict: addr.subdistrict, district: addr.district, province: addr.province, })); } else { setFormData(prev => ({ ...prev, zipcode: code, subdistrict: '', district: '', province: '' })); } } else { setAddressOptions([]); }
            };
            const handleAddressSelect = (e) => { const index = e.target.value; if (index === "") return; const addr = addressOptions[index]; setFormData(prev => ({ ...prev, subdistrict: addr.subdistrict, district: addr.district, province: addr.province, })); };

            const handleImageUpload = async (e) => {
                const files = Array.from(e.target.files); if (files.length + imagesPreview.length > 10) { alert('อัปโหลดได้สูงสุด 10 รูป'); return; }
                const newImages = []; for (const file of files) { const base64 = await resizeImage(file); newImages.push(base64); }
                const updated = [...imagesPreview, ...newImages]; setImagesPreview(updated); setFormData(prev => ({ ...prev, images: updated }));
            };
            const removeImage = (idx) => { const updated = imagesPreview.filter((_, i) => i !== idx); setImagesPreview(updated); setFormData(prev => ({ ...prev, images: updated })); };
            
            const handleFacilityChange = (e) => { const val = e.target.value; if (val && !formData.facilitiesList?.includes(val)) setFormData(prev => ({ ...prev, facilitiesList: [...(prev.facilitiesList || []), val] })); };
            const addCustomFacility = () => { if(newFacility && !formData.facilitiesList?.includes(newFacility)) { setFormData(prev => ({ ...prev, facilitiesList: [...(prev.facilitiesList || []), newFacility] })); setNewFacility(''); } };
            const removeFacility = (fac) => { setFormData(prev => ({ ...prev, facilitiesList: prev.facilitiesList.filter(f => f !== fac) })); };

            const handleSaveProperty = async (e) => {
                e.preventDefault(); setIsSaving(true);
                try {
                const lat = formData.lat ? formData.lat.trim().replace(',', '') : ''; const lng = formData.lng ? formData.lng.trim().replace(',', '') : '';
                const facilitiesList = Array.isArray(formData.facilitiesList) ? formData.facilitiesList : [];
                const finalImages = [];
                if (formData.images && formData.images.length > 0) {
                    for (const img of formData.images) { if (typeof img === 'string' && img.startsWith('data:')) { const url = await uploadBase64ToStorage(img); finalImages.push(url); } else { finalImages.push(img); } }
                }
                const dataToSave = { ...formData, images: finalImages, lat, lng, facilitiesList };
                if (editData) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'properties', editData.id), dataToSave);
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'properties'), { ...dataToSave, createdAt: serverTimestamp() });
                setIsSaving(false); setSaveSuccess(true);
                } catch (err) { setIsSaving(false); alert("Error: " + err.message); }
            };

            const closeSuccessOverlay = () => { setSaveSuccess(false); setIsEditing(false); setEditData(null); setFormData(initialForm); setImagesPreview([]); };

            const handleDeleteProperty = async (id) => { if (window.confirm('ยืนยันการลบ?')) { try { setIsSaving(true); await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'properties', id)); setIsSaving(false); } catch (error) { setIsSaving(false); alert(error.message); } } };

            const handleSaveCompany = async (e) => { e.preventDefault(); setIsSaving(true); let newLogoUrl = companyForm.logoUrl; if (newLogoUrl && newLogoUrl.startsWith('data:')) { newLogoUrl = await uploadBase64ToStorage(newLogoUrl); } const companyDataToSave = { ...companyForm, logoUrl: newLogoUrl }; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'company_info', 'main'), companyDataToSave); setCompanyForm(companyDataToSave); setIsSaving(false); setSaveSuccess(true); };
            const handleCompanyLogo = async (e) => { const file = e.target.files[0]; if(file) { const base64 = await resizeImage(file); setCompanyForm(prev => ({...prev, logoUrl: base64})); } };

            const handleAddYear = () => { if(!newPortfolioYear) return; const currentYears = companyForm.portfolio_years || []; if(currentYears.find(y => y.year === newPortfolioYear)) { alert('มีปีนี้อยู่แล้ว'); return; } setCompanyForm({ ...companyForm, portfolio_years: [...currentYears, { year: newPortfolioYear, images: [] }] }); setNewPortfolioYear(''); };
            const handleDeleteYear = (year) => { if(confirm(`ลบข้อมูลปี ${year}?`)) { setCompanyForm({ ...companyForm, portfolio_years: companyForm.portfolio_years.filter(y => y.year !== year) }); } };
            const handlePortfolioImagesUpload = async (e, yearIndex) => { const files = Array.from(e.target.files); if(files.length === 0) return; setIsSaving(true); const newImages = []; for(const file of files) { const base64 = await resizeImage(file); newImages.push(base64); } setIsSaving(false); const updatedYears = [...(companyForm.portfolio_years || [])]; updatedYears[yearIndex].images = [...updatedYears[yearIndex].images, ...newImages]; setCompanyForm({ ...companyForm, portfolio_years: updatedYears }); };
            const removePortfolioImageInYear = (yearIndex, imgIndex) => { const updatedYears = [...companyForm.portfolio_years]; updatedYears[yearIndex].images = updatedYears[yearIndex].images.filter((_, i) => i !== imgIndex); setCompanyForm({ ...companyForm, portfolio_years: updatedYears }); };
            const handleSavePortfolio = async () => { setIsSaving(true); const updatedYears = []; if (companyForm.portfolio_years && companyForm.portfolio_years.length > 0) { for (const yearGroup of companyForm.portfolio_years) { const uploadedImages = []; for (const img of yearGroup.images) { if (typeof img === 'string' && img.startsWith('data:')) { const url = await uploadBase64ToStorage(img); uploadedImages.push(url); } else { uploadedImages.push(img); } } updatedYears.push({ ...yearGroup, images: uploadedImages }); } } const dataToSave = { ...companyForm, portfolio_years: updatedYears }; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'company_info', 'main'), dataToSave); setCompanyForm(dataToSave); setIsSaving(false); setSaveSuccess(true); };

            const handleAddUser = async (e) => { e.preventDefault(); if (!inviteEmail || !invitePassword) return; try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', inviteEmail.toLowerCase().trim()), { email: inviteEmail.toLowerCase().trim(), password: invitePassword, role: inviteRole, addedBy: userEmail, createdAt: serverTimestamp() }); setInviteEmail(''); setInvitePassword(''); alert('เพิ่มเรียบร้อย'); } catch (err) { alert(err.message); } };
            const handleUpdateRole = async (userId, newRole) => { if (confirm(`ยืนยันเปลี่ยนสิทธิ์เป็น ${newRole}?`)) { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { role: newRole }); } catch (err) { alert(err.message); } } };
            const handleApproveUser = async (userId, role, email) => { if (confirm(`อนุมัติสิทธิ์ ${role} ให้ ${email}?`)) { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userId), { role: role }); } catch (err) { alert(err.message); } } };
            const handleRemoveUser = async (id) => { if(confirm('ลบสิทธิ์ผู้ใช้นี้?')) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id)); } };

            return (
                <div className="fixed inset-0 z-[60] bg-gray-50 flex flex-col font-sans">
                    {/* Loaders */}
                    {isSaving && <div className="absolute inset-0 z-[100] bg-black/60 flex flex-col items-center justify-center text-white backdrop-blur-sm"><Loader size={48} className="animate-spin mb-4"/><h3 className="font-light">กำลังบันทึก...</h3></div>}
                    {saveSuccess && <div className="absolute inset-0 z-[100] bg-black/60 flex items-center justify-center backdrop-blur-sm"><div className="bg-white p-8 rounded-2xl text-center"><Check size={40} className="mx-auto text-green-500 mb-4"/><h3 className="mb-4">บันทึกสำเร็จ</h3><button onClick={closeSuccessOverlay} className="btn-primary w-full">ตกลง</button></div></div>}

                    {/* Admin Header */}
                    <div className="bg-white border-b px-6 py-4 flex justify-between items-center z-10">
                        <div className="flex items-center gap-3">
                            <span className="text-xl font-light text-brand-green tracking-widest uppercase">Admin Panel</span>
                            <span className="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">{userRole}</span>
                        </div>
                        <div className="flex gap-4 items-center">
                            <button onClick={onClose} className="text-sm text-gray-500 hover:text-black transition">กลับหน้าเว็บ</button>
                            <button onClick={onLogout} className="text-sm bg-red-50 text-red-500 px-4 py-1.5 rounded-full hover:bg-red-500 hover:text-white transition">ออกจากระบบ</button>
                        </div>
                    </div>

                    {/* Admin Body */}
                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}
                        <div className="w-64 bg-white border-r py-6 flex flex-col gap-2">
                            <button onClick={() => { setPanelTab('properties'); setIsEditing(false); }} className={`px-6 py-3 text-left text-sm flex items-center gap-3 transition ${panelTab === 'properties' ? 'text-brand-green bg-brand-light font-medium border-r-2 border-brand-green' : 'text-gray-500 hover:bg-gray-50'}`}><Home size={18}/> จัดการบ้าน</button>
                            {userRole === 'host' && <button onClick={() => setPanelTab('company')} className={`px-6 py-3 text-left text-sm flex items-center gap-3 transition ${panelTab === 'company' ? 'text-brand-green bg-brand-light font-medium border-r-2 border-brand-green' : 'text-gray-500 hover:bg-gray-50'}`}><Briefcase size={18}/> ข้อมูลบริษัท</button>}
                            {userRole === 'host' && <button onClick={() => setPanelTab('portfolio_images')} className={`px-6 py-3 text-left text-sm flex items-center gap-3 transition ${panelTab === 'portfolio_images' ? 'text-brand-green bg-brand-light font-medium border-r-2 border-brand-green' : 'text-gray-500 hover:bg-gray-50'}`}><ImageIcon size={18}/> จัดการรูปผลงาน</button>}
                            {userRole === 'host' && <button onClick={() => setPanelTab('users')} className={`px-6 py-3 text-left text-sm flex items-center gap-3 transition ${panelTab === 'users' ? 'text-brand-green bg-brand-light font-medium border-r-2 border-brand-green' : 'text-gray-500 hover:bg-gray-50'}`}><Users size={18}/> ผู้ดูแลระบบ</button>}
                        </div>

                        {/* Content */}
                        <div className="flex-1 p-8 overflow-y-auto">
                            {/* Properties List */}
                            {panelTab === 'properties' && !isEditing && (
                                <div className="max-w-6xl mx-auto">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-2xl font-light">รายการทรัพย์สิน</h3>
                                        <div className="flex gap-3">
                                            <input type="text" placeholder="ค้นหา..." className="input-modern py-2 w-64" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                                            <button onClick={startNew} className="btn-primary"><Plus size={16}/> เพิ่มใหม่</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 gap-4">
                                        {filteredProperties.map(p => (
                                            <div key={p.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex gap-4 items-center">
                                                <div className="w-24 h-24 rounded-lg overflow-hidden relative bg-gray-100">
                                                    <img src={p.images?.[0] || p.imageUrl} className="w-full h-full object-cover"/>
                                                </div>
                                                <div className="flex-1">
                                                    <h4 className="font-medium">{p.project_name}</h4>
                                                    <p className="text-xs text-gray-500 mt-1">{p.category} • {p.subdistrict}</p>
                                                    <p className="font-medium text-brand-green mt-1">{Number(p.price).toLocaleString()} ฿</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => startEdit(p)} className="p-2 text-gray-400 hover:text-brand-green bg-gray-50 rounded-lg transition"><Edit size={18}/></button>
                                                    <button onClick={() => handleDeleteProperty(p.id)} className="p-2 text-gray-400 hover:text-red-500 bg-gray-50 rounded-lg transition"><Trash2 size={18}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Property Editor */}
                            {panelTab === 'properties' && isEditing && (
                                <div className="max-w-6xl mx-auto">
                                    <div className="flex justify-between mb-8 border-b pb-4">
                                        <h3 className="text-2xl font-light">{editData ? 'แก้ไขข้อมูล' : 'เพิ่มรายการใหม่'}</h3>
                                        <div className="flex gap-3">
                                            <button onClick={()=>setIsEditing(false)} className="px-6 py-2 text-gray-500 hover:bg-gray-100 rounded-full transition">ยกเลิก</button>
                                            <button onClick={handleSaveProperty} className="btn-primary">บันทึกข้อมูล</button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="lg:col-span-2 space-y-6">
                                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                                <h4 className="font-medium mb-6 pb-2 border-b">ข้อมูลหลัก</h4>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="col-span-2"><label className="label">ชื่อโครงการ</label><input className="input-modern" value={formData.project_name} onChange={e=>setFormData({...formData, project_name: e.target.value})}/></div>
                                                    <div><label className="label">ประเภท</label><select className="input-modern" value={formData.category} onChange={e=>setFormData({...formData, category: e.target.value})}>{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                                                    <div><label className="label">ราคา (บาท)</label><input type="number" className="input-modern font-medium text-brand-green" value={formData.price} onChange={e=>setFormData({...formData, price: e.target.value})}/></div>
                                                    <div className="col-span-2">
                                                        <label className="label">ป้ายสถานะ (Badge)</label>
                                                        <select className="input-modern" value={formData.badge} onChange={e=>setFormData({...formData, badge: e.target.value})}>
                                                            {BADGES.map(b => <option key={b.value} value={b.value}>{b.label}</option>)}
                                                        </select>
                                                    </div>
                                                    <div className="col-span-2"><label className="label">รายละเอียด (จุดเด่น)</label><textarea rows="4" className="input-modern" value={formData.highlights} onChange={e=>setFormData({...formData, highlights: e.target.value})}/></div>
                                                    <div className="col-span-2"><label className="label">ลิงก์ YouTube</label><input className="input-modern" value={formData.youtubeUrl} onChange={e=>setFormData({...formData, youtubeUrl: e.target.value})}/></div>
                                                </div>
                                            </div>

                                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                                <h4 className="font-medium mb-6 pb-2 border-b">รายละเอียดพื้นที่</h4>
                                                <div className="grid grid-cols-3 gap-4">
                                                    <div className="col-span-1"><label className="label">ห้องนอน</label><input type="number" className="input-modern" value={formData.bedrooms} onChange={e=>setFormData({...formData, bedrooms: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">ห้องน้ำ</label><input type="number" className="input-modern" value={formData.bathrooms} onChange={e=>setFormData({...formData, bathrooms: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">จอดรถ</label><input className="input-modern" value={formData.parking} onChange={e=>setFormData({...formData, parking: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">ตร.ว.</label><input className="input-modern" value={formData.area_wah} onChange={e=>setFormData({...formData, area_wah: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">ตร.ม.</label><input className="input-modern" value={formData.area_sqm} onChange={e=>setFormData({...formData, area_sqm: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">จำนวนชั้น</label><input type="number" className="input-modern" value={formData.floors} onChange={e=>setFormData({...formData, floors: e.target.value})}/></div>
                                                    <div className="col-span-1"><label className="label">ทิศ</label><select className="input-modern" value={formData.direction} onChange={e=>setFormData({...formData, direction: e.target.value})}><option value="">- เลือก -</option>{DIRECTIONS.map(d=><option key={d}>{d}</option>)}</select></div>
                                                </div>
                                            </div>

                                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                                <h4 className="font-medium mb-6 pb-2 border-b">ที่ตั้ง</h4>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="col-span-2"><label className="label">รหัสไปรษณีย์</label><input className="input-modern" value={formData.zipcode} onChange={handleZipcodeChange}/></div>
                                                    {addressOptions.length > 1 && (
                                                        <div className="col-span-2">
                                                            <label className="label text-brand-green">เลือกตำบล/แขวง</label>
                                                            <select className="input-modern" onChange={handleAddressSelect} defaultValue=""><option value="" disabled>- เลือก -</option>{addressOptions.map((opt, idx)=><option key={idx} value={idx}>{opt.subdistrict} - {opt.district}</option>)}</select>
                                                        </div>
                                                    )}
                                                    <div><label className="label">ตำบล</label><input className="input-modern bg-gray-50" readOnly value={formData.subdistrict}/></div>
                                                    <div><label className="label">อำเภอ</label><input className="input-modern bg-gray-50" readOnly value={formData.district}/></div>
                                                    <div className="col-span-2"><label className="label">จังหวัด</label><input className="input-modern bg-gray-50" readOnly value={formData.province}/></div>
                                                    <div><label className="label">ละติจูด (Lat)</label><input className="input-modern" value={formData.lat} onChange={e=>setFormData({...formData, lat: e.target.value})}/></div>
                                                    <div><label className="label">ลองจิจูด (Lng)</label><input className="input-modern" value={formData.lng} onChange={e=>setFormData({...formData, lng: e.target.value})}/></div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                                <h4 className="font-medium mb-6 pb-2 border-b">รูปภาพ</h4>
                                                <div className="grid grid-cols-3 gap-2 mb-4">
                                                    {imagesPreview.map((img, i) => (
                                                        <div key={i} className="aspect-square bg-gray-100 rounded-lg relative group overflow-hidden">
                                                            <img src={img} className="w-full h-full object-cover"/>
                                                            <button type="button" onClick={()=>removeImage(i)} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100"><X size={12}/></button>
                                                        </div>
                                                    ))}
                                                    {imagesPreview.length < 10 && (
                                                        <label className="aspect-square border-2 border-dashed border-gray-200 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50">
                                                            <Upload size={20} className="text-gray-400 mb-1" />
                                                            <span className="text-[10px] text-gray-500">เพิ่มรูป</span>
                                                            <input type="file" multiple accept="image/*" className="hidden" onChange={handleImageUpload}/>
                                                        </label>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                                <h4 className="font-medium mb-6 pb-2 border-b">สิ่งอำนวยความสะดวก</h4>
                                                <select className="input-modern mb-3" value="" onChange={handleFacilityChange}><option value="">- เลือกจากรายการ -</option>{COMMON_FACILITIES.map(f=><option key={f}>{f}</option>)}</select>
                                                <div className="flex gap-2 mb-4">
                                                    <input className="input-modern text-sm" placeholder="พิมพ์เพิ่มเอง" value={newFacility} onChange={e=>setNewFacility(e.target.value)}/>
                                                    <button type="button" onClick={addCustomFacility} className="bg-brand-green text-white px-3 rounded-lg"><Plus size={16}/></button>
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    {formData.facilitiesList?.map((fac, i) => (
                                                        <span key={i} className="px-3 py-1 rounded-full text-xs bg-brand-light text-brand-green flex items-center gap-1 border border-brand-green/20">{fac} <button type="button" onClick={()=>removeFacility(fac)}><X size={12}/></button></span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Other Admin Tabs (Company, Portfolio, Users) - Keeping logic, light style update */}
                            {panelTab === 'company' && (
                                <div className="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                    <h3 className="text-2xl font-light mb-8 pb-4 border-b">ข้อมูลบริษัท</h3>
                                    <form onSubmit={handleSaveCompany} className="space-y-6">
                                        <div className="flex gap-6 items-center">
                                            <div className="w-24 h-24 rounded-full overflow-hidden bg-gray-100 relative group">
                                                <img src={companyForm.logoUrl} className="w-full h-full object-cover"/>
                                                <label className="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-white opacity-0 group-hover:opacity-100 cursor-pointer text-xs"><Upload size={16}/>เปลี่ยน<input type="file" className="hidden" onChange={handleCompanyLogo}/></label>
                                            </div>
                                            <div className="flex-1"><label className="label">ชื่อแบรนด์ / บริษัท</label><input className="input-modern" value={companyForm.name} onChange={e=>setCompanyForm({...companyForm, name: e.target.value})}/></div>
                                        </div>
                                        <div><label className="label">ที่อยู่</label><textarea className="input-modern" rows="2" value={companyForm.address} onChange={e=>setCompanyForm({...companyForm, address: e.target.value})}/></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="label">เบอร์โทร</label><input className="input-modern" value={companyForm.phone} onChange={e=>setCompanyForm({...companyForm, phone: e.target.value})}/></div>
                                            <div><label className="label">Email</label><input className="input-modern" value={companyForm.email} onChange={e=>setCompanyForm({...companyForm, email: e.target.value})}/></div>
                                            <div><label className="label">Line URL</label><input className="input-modern" value={companyForm.line} onChange={e=>setCompanyForm({...companyForm, line: e.target.value})}/></div>
                                            <div><label className="label">Facebook URL</label><input className="input-modern" value={companyForm.facebook} onChange={e=>setCompanyForm({...companyForm, facebook: e.target.value})}/></div>
                                        </div>
                                        <div><label className="label">สโลแกน / คำโปรย</label><input className="input-modern" value={companyForm.description} onChange={e=>setCompanyForm({...companyForm, description: e.target.value})}/></div>
                                        <div className="text-right pt-4"><button className="btn-primary">บันทึกข้อมูล</button></div>
                                    </form>
                                </div>
                            )}

                            {panelTab === 'portfolio_images' && (
                                <div className="max-w-5xl mx-auto">
                                    <div className="flex justify-between items-center mb-8 border-b pb-4">
                                        <h3 className="text-2xl font-light">จัดการรูปผลงาน</h3>
                                        <button onClick={handleSavePortfolio} className="btn-primary">บันทึกทั้งหมด</button>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8 flex gap-4 items-end">
                                        <div><label className="label">สร้างหมวดหมู่ปี</label><input type="number" className="input-modern w-48" value={newPortfolioYear} onChange={e=>setNewPortfolioYear(e.target.value)}/></div>
                                        <button onClick={handleAddYear} className="px-6 py-2.5 bg-gray-800 text-white rounded-lg">สร้าง</button>
                                    </div>
                                    <div className="space-y-6">
                                        {companyForm.portfolio_years?.sort((a,b)=>b.year-a.year).map((yg, idx) => (
                                            <div key={yg.year} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                                <div className="flex justify-between items-center mb-6">
                                                    <h4 className="text-lg font-medium">ปี {yg.year}</h4>
                                                    <button onClick={()=>handleDeleteYear(yg.year)} className="text-sm text-red-500 hover:underline">ลบปีนี้</button>
                                                </div>
                                                <div className="mb-4">
                                                    <label className="cursor-pointer inline-flex items-center gap-2 px-4 py-2 bg-gray-50 border rounded-lg text-sm hover:bg-gray-100"><Upload size={16}/> เลือกรูปภาพ<input type="file" multiple accept="image/*" className="hidden" onChange={(e)=>handlePortfolioImagesUpload(e, idx)}/></label>
                                                </div>
                                                <div className="grid grid-cols-5 gap-4">
                                                    {yg.images.map((img, i) => (
                                                        <div key={i} className="aspect-square bg-gray-100 rounded-lg relative group overflow-hidden">
                                                            <img src={img} className="w-full h-full object-cover"/><button onClick={()=>removePortfolioImageInYear(idx, i)} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100"><X size={12}/></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {panelTab === 'users' && (
                                <div className="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                                    <h3 className="text-2xl font-light mb-8 border-b pb-4">จัดการผู้ดูแลระบบ</h3>
                                    <form onSubmit={handleAddUser} className="flex gap-4 items-end mb-8 bg-gray-50 p-6 rounded-xl">
                                        <div className="flex-1"><label className="label">อีเมล</label><input type="email" required className="input-modern" value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)}/></div>
                                        <div className="flex-1"><label className="label">รหัสผ่าน (ชั่วคราว)</label><input type="text" required minLength={6} className="input-modern" value={invitePassword} onChange={e=>setInvitePassword(e.target.value)}/></div>
                                        <div className="w-32"><label className="label">สิทธิ์</label><select className="input-modern" value={inviteRole} onChange={e=>setInviteRole(e.target.value)}><option value="admin">Admin</option><option value="host">Host</option></select></div>
                                        <button type="submit" className="btn-primary py-2.5">เพิ่ม</button>
                                    </form>
                                    <table className="w-full text-left">
                                        <thead className="bg-gray-50 text-gray-500 text-sm"><tr><th className="p-4 font-normal">อีเมล</th><th className="p-4 font-normal">สถานะ</th><th className="p-4 text-right font-normal">จัดการ</th></tr></thead>
                                        <tbody className="divide-y divide-gray-100 text-sm">
                                            {users.map(u => (
                                                <tr key={u.id}>
                                                    <td className="p-4">{u.email}</td>
                                                    <td className="p-4">
                                                        {u.role === 'pending' || !u.role ? (
                                                            <div className="flex gap-2 items-center"><span className="text-yellow-600 bg-yellow-50 px-2 py-1 rounded">รออนุมัติ</span><button onClick={()=>handleApproveUser(u.id, 'admin', u.email)} className="text-brand-green hover:underline">อนุมัติ Admin</button></div>
                                                        ) : (
                                                            <select value={u.role} onChange={e=>handleUpdateRole(u.id, e.target.value)} disabled={u.email===HOST_EMAIL} className={`p-1.5 border rounded outline-none ${u.role==='admin'?'bg-blue-50 text-blue-700':'bg-brand-light text-brand-green'}`}><option value="admin">Admin</option><option value="host">Host</option><option value="pending">ระงับ</option></select>
                                                        )}
                                                    </td>
                                                    <td className="p-4 text-right">{u.email !== HOST_EMAIL && <button onClick={()=>handleRemoveUser(u.id)} className="text-red-500 hover:underline">ลบ</button>}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
